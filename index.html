<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Green Elements - Cotizador Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f0; padding: 20px; color: #333; }
        .container { max-width: 1100px; background: white; padding: 50px; border-radius: 8px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-area img { max-width: 250px; height: auto; }
        
        .presupuesto-banner {
            background: #28a745; color: white; padding: 15px 40px; margin: 0 -50px 30px -50px;
            display: flex; justify-content: space-between; align-items: center; border-right: 12px solid #218838;
        }
        .presupuesto-banner h1 { margin: 0; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; }
        
        .db-selector { background: #f8f9fa; padding: 10px 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #28a745; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .grid-inputs label { font-size: 11px; font-weight: bold; color: #28a745; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .grid-inputs input { width: 100%; padding: 8px 0; border: none; border-bottom: 1px solid #ddd; font-size: 14px; outline: none; background: transparent; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f8f1; color: #1e7e34; padding: 12px; font-size: 11px; border-bottom: 2px solid #28a745; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        
        .fila-especialidad { background-color: #f9f9f9 !important; font-weight: bold; color: #1e7e34; }
        .fila-especialidad input { border: none; background: transparent; width: 100%; font-weight: bold; text-transform: uppercase; }

        .resumen-container { margin-top: 30px; background: #fff; border: 1px solid #e2e8e2; padding: 20px; border-radius: 4px; }
        .resumen-header { background: #e8f5e9; color: #2e7d32; padding: 8px; text-align: center; font-weight: bold; margin-bottom: 10px; }

        .btn-pdf { background: #28a745; color: white; width: 100%; padding: 18px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; border-radius: 4px; }
        .btn-add { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-right: 5px; }
        
        .notes-area textarea { width: 100%; min-height: 120px; border: 1px solid #eee; padding: 10px; margin-top: 10px; font-family: inherit; }
    </style>
</head>
<body onload="inicializar()">

<div class="container">
    <div class="header-top">
        <div class="logo-area">
            <img src="ddddd-removebg-preview.png" id="imgLogo" alt="Green Elements Logo" crossorigin="anonymous">
        </div>
        <div class="db-selector" style="width: 45%;">
            <label style="font-size: 10px; font-weight: bold;">SELECCIONAR CLIENTE:</label>
            <select id="selectCliente" onchange="cargarClienteManual()" style="width: 100%; border: none; font-size: 14px; background: transparent; cursor: pointer;">
                <option value="">-- Seleccionar de la lista --</option>
            </select>
        </div>
    </div>

    <div class="presupuesto-banner">
        <h1>Cotización</h1>
        <div style="text-align: right; font-size: 12px;">
            <input type="text" id="fecha" style="border:none; background:transparent; color:white; text-align:right; width:200px;">
        </div>
    </div>

    <div class="grid-inputs">
        <div><label>Cliente / Empresa</label><input type="text" id="atencion" oninput="autoGuardar()"></div>
        <div><label>Proyecto / Equipo</label><input type="text" id="proyecto" oninput="autoGuardar()"></div>
        <div style="grid-column: span 2;"><label>Ubicación de Instalación</label><input type="text" id="ubicacion" oninput="autoGuardar()"></div>
    </div>

    <table id="tablaItems">
        <thead>
            <tr>
                <th style="width:50%">DESCRIPCIÓN DEL SISTEMA / SERVICIO</th>
                <th style="width:10%">CANT.</th>
                <th style="width:15%">PRECIO UNIT.</th>
                <th style="width:15%">IMPORTE</th>
                <th style="width:5%"></th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>

    <div style="margin-top: 15px;">
        <button class="btn-add" onclick="agregarSeccion()">+ Añadir Categoría</button>
        <button class="btn-add" style="background:#28a745" onclick="agregarFila()">+ Añadir Concepto</button>
    </div>

    <div id="resumenSeccion" class="resumen-container" style="display:none;">
        <div class="resumen-header">RESUMEN DE INVERSIÓN</div>
        <div id="resumenLista"></div>
    </div>

    <div style="display: flex; justify-content: space-between; margin-top: 30px;">
        <div style="width: 60%;" class="notes-area">
            <label style="font-weight:bold; color:#28a745">NOTAS Y GARANTÍAS:</label>
            <textarea id="notasFinales" oninput="autoGuardar()">Vigencia de cotización: 15 días.
Garantía: 1 año en defectos de fábrica.
Tiempo de entrega: Inmediato sujeto a existencias.
Instalación incluida en área metropolitana de Monterrey.</textarea>
        </div>
        <div style="width: 30%; text-align: right;">
            <p>SUBTOTAL: <span id="subtotalDisplay">$ 0.00</span></p>
            <p>IVA (16%): <span id="ivaDisplay">$ 0.00</span></p>
            <h2 style="color:#28a745">TOTAL: <span id="totalDisplay">$ 0.00</span></h2>
        </div>
    </div>

    <button class="btn-pdf" onclick="generarPDF()">GENERAR COTIZACIÓN PDF</button>
</div>

<script>
    // --- 3. CONFIGURACIÓN MANUAL DE CLIENTES ---
    const CLIENTES_MANUALES = [
        { nombre: "Grupo de Lords", proyecto: "Filtración Industrial", ubicacion: "Monterrey, N.L." },
        { nombre: "Residencial San Pedro", proyecto: "Generador Osoley 30L", ubicacion: "San Pedro Garza García" },
        { nombre: "Industrias Green", proyecto: "Mantenimiento Preventivo", ubicacion: "Santa Catarina, N.L." }
    ];

    function inicializar() {
        const select = document.getElementById('selectCliente');
        CLIENTES_MANUALES.forEach((c, idx) => {
            let opt = document.createElement('option');
            opt.value = idx; opt.textContent = c.nombre;
            select.appendChild(opt);
        });

        const hoy = new Date();
        document.getElementById('fecha').value = hoy.toLocaleDateString('es-MX', { day:'2-digit', month:'long', year:'numeric'});
        
        const backup = localStorage.getItem('green_backup');
        if(backup) { aplicarDatos(JSON.parse(backup)); } else { agregarSeccion("Equipos de Filtración"); agregarFila(); }
    }

    function cargarClienteManual() {
        const idx = document.getElementById('selectCliente').value;
        if(idx === "") return;
        const c = CLIENTES_MANUALES[idx];
        document.getElementById('atencion').value = c.nombre;
        document.getElementById('proyecto').value = c.proyecto;
        document.getElementById('ubicacion').value = c.ubicacion;
        autoGuardar();
    }

    function agregarSeccion(titulo = "") {
        let row = document.getElementById("cuerpoTabla").insertRow();
        row.className = "fila-especialidad";
        row.innerHTML = `<td colspan="3"><input type="text" value="${titulo}" placeholder="CATEGORÍA (Ej: Generadores, Filtros...)" oninput="autoGuardar()"></td><td class="sub-esp" style="text-align:right">$ 0.00</td><td><button onclick="this.closest('tr').remove(); autoGuardar()">×</button></td>`;
    }

    function agregarFila(v = ["", "1", "0"]) {
        let row = document.getElementById("cuerpoTabla").insertRow();
        row.innerHTML = `
            <td><textarea style="width:100%; border:none; resize:none;" oninput="autoGuardar()">${v[0]}</textarea></td>
            <td><input type="number" class="cant" value="${v[1]}" style="width:100%; border:none;" oninput="autoGuardar()"></td>
            <td><input type="number" class="prec" value="${v[2]}" style="width:100%; border:none;" oninput="autoGuardar()"></td>
            <td class="imp" style="text-align:right">$ 0.00</td>
            <td><button onclick="this.closest('tr').remove(); autoGuardar()">×</button></td>`;
    }

    function autoGuardar() {
        const filas = [];
        for(let r of document.getElementById("cuerpoTabla").rows) {
            if(r.classList.contains("fila-especialidad")) {
                filas.push({t:'s', v: r.querySelector("input").value});
            } else {
                let i = r.querySelectorAll("textarea, input");
                filas.push({t:'f', v: [i[0].value, i[1].value, i[2].value]});
            }
        }
        const datos = {
            atencion: document.getElementById('atencion').value,
            proyecto: document.getElementById('proyecto').value,
            ubicacion: document.getElementById('ubicacion').value,
            notas: document.getElementById('notasFinales').value,
            filas: filas
        };
        localStorage.setItem('green_backup', JSON.stringify(datos));
        recalcular();
    }

    function aplicarDatos(d) {
        document.getElementById('atencion').value = d.atencion;
        document.getElementById('proyecto').value = d.proyecto;
        document.getElementById('ubicacion').value = d.ubicacion;
        document.getElementById('notasFinales').value = d.notas;
        document.getElementById("cuerpoTabla").innerHTML = "";
        d.filas.forEach(f => { if(f.t === 's') agregarSeccion(f.v); else agregarFila(f.v); });
        recalcular();
    }

    function recalcular() {
        let total = 0; let sub = 0; let currentS = null;
        let resumen = [];
        const fmt = (n) => n.toLocaleString('en-US', {minimumFractionDigits:2});

        for(let r of document.getElementById("cuerpoTabla").rows) {
            if(r.classList.contains("fila-especialidad")) {
                if(currentS) {
                    currentS.querySelector(".sub-esp").innerText = "$ " + fmt(sub);
                    resumen.push({n: currentS.querySelector("input").value, m: sub});
                }
                currentS = r; sub = 0;
            } else {
                let c = parseFloat(r.querySelector(".cant").value) || 0;
                let p = parseFloat(r.querySelector(".prec").value) || 0;
                let imp = c * p; r.querySelector(".imp").innerText = "$ " + fmt(imp);
                sub += imp; total += imp;
            }
        }
        if(currentS) {
            currentS.querySelector(".sub-esp").innerText = "$ " + fmt(sub);
            resumen.push({n: currentS.querySelector("input").value, m: sub});
        }

        document.getElementById("resumenSeccion").style.display = resumen.length > 0 ? "block" : "none";
        document.getElementById("resumenLista").innerHTML = resumen.map(x => `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #eee;"><span>${x.n}</span><b>$ ${fmt(x.m)}</b></div>`).join("");

        document.getElementById('subtotalDisplay').innerText = "$ " + fmt(total);
        document.getElementById('ivaDisplay').innerText = "$ " + fmt(total * 0.16);
        document.getElementById('totalDisplay').innerText = "$ " + fmt(total * 1.16);
    }

    async function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const logo = document.getElementById('imgLogo');
        const fmt = (v) => v.toLocaleString('en-US', {minimumFractionDigits:2});

        // Estilo Green Elements
        doc.setFillColor(40, 167, 69); doc.rect(0, 40, 210, 15, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("COTIZACIÓN DE SISTEMAS", 15, 50);
        
        try { if(logo.complete) doc.addImage(logo, 'PNG', 135, 10, 60, 24); } catch(e){}

        doc.setTextColor(0, 0, 0); doc.setFontSize(10);
        doc.text("FECHA: " + document.getElementById('fecha').value, 195, 35, {align:'right'});
        doc.setFont("helvetica", "bold");
        doc.text("CLIENTE: " + document.getElementById('atencion').value, 15, 65);
        doc.text("PROYECTO: " + document.getElementById('proyecto').value, 15, 71);
        doc.setFont("helvetica", "normal");
        doc.text("UBICACIÓN: " + document.getElementById('ubicacion').value, 15, 77);

        let body = [];
        for(let r of document.getElementById("cuerpoTabla").rows) {
            if(r.classList.contains("fila-especialidad")) {
                body.push([{content: r.querySelector("input").value.toUpperCase(), colSpan:3, styles:{fillColor:[230,245,230], fontStyle:'bold'}}, {content: r.querySelector(".sub-esp").innerText, styles:{fillColor:[230,245,230], halign:'right', fontStyle:'bold'}}]);
            } else {
                let i = r.querySelectorAll("textarea, input");
                let imp = (parseFloat(i[1].value)*parseFloat(i[2].value)) || 0;
                body.push([i[0].value, i[1].value, "$ "+fmt(parseFloat(i[2].value)), "$ "+fmt(imp)]);
            }
        }

        doc.autoTable({
            startY: 85, head: [['DESCRIPCIÓN', 'CANT.', 'P. UNITARIO', 'IMPORTE']], body: body,
            theme: 'striped', headStyles: {fillColor: [40, 167, 69]}, styles: {fontSize: 8}
        });

        let finalY = doc.lastAutoTable.finalY + 10;
        doc.setFont("helvetica", "bold"); doc.text("NOTAS Y CONDICIONES:", 15, finalY);
        doc.setFont("helvetica", "normal"); doc.setFontSize(8);
        doc.text(doc.splitTextToSize(document.getElementById('notasFinales').value, 110), 15, finalY + 5);

        doc.setFontSize(10);
        doc.text("SUBTOTAL:", 140, finalY + 5); doc.text(document.getElementById('subtotalDisplay').innerText, 195, finalY + 5, {align:'right'});
        doc.text("IVA (16%): 140", finalY + 12); doc.text(document.getElementById('ivaDisplay').innerText, 195, finalY + 12, {align:'right'});
        doc.setFillColor(40, 167, 69); doc.rect(138, finalY + 17, 60, 10, 'F');
        doc.setTextColor(255,255,255); doc.setFont("helvetica", "bold");
        doc.text("TOTAL:", 140, finalY + 23); doc.text(document.getElementById('totalDisplay').innerText, 195, finalY + 23, {align:'right'});

        doc.save("Cotizacion_GreenElements.pdf");
    }
</script>
</body>
</html>
