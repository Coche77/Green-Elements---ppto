<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Green Elements - Cotizador Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f0; padding: 20px; color: #333; }
        .container { max-width: 1100px; background: white; padding: 50px; border-radius: 8px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-area img { max-width: 250px; height: auto; }
        .presupuesto-banner {
            background: #28a745; color: white; padding: 15px 40px; margin: 0 -50px 30px -50px;
            display: flex; justify-content: space-between; align-items: center; border-right: 12px solid #218838;
        }
        .presupuesto-banner h1 { margin: 0; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; }
        .currency-selector { background: #fff3cd; padding: 10px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #ffeeba; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .grid-inputs label { font-size: 11px; font-weight: bold; color: #28a745; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .grid-inputs input { width: 100%; padding: 8px 0; border: none; border-bottom: 1px solid #ddd; font-size: 14px; outline: none; background: transparent; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f8f1; color: #1e7e34; padding: 12px; font-size: 11px; border-bottom: 2px solid #28a745; text-align: left; }
        .fila-especialidad { background-color: #f9f9f9 !important; font-weight: bold; color: #1e7e34; }
        .btn-pdf { background: #28a745; color: white; width: 100%; padding: 18px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; border-radius: 4px; }
    </style>
</head>
<body onload="inicializar()">

<div class="container">
    <div class="header-top">
        <div class="logo-area"><img src="ddddd-removebg-preview.png" id="imgLogo" alt="Logo" crossorigin="anonymous"></div>
        <div style="width: 45%;">
            <select id="selectCliente" onchange="cargarClienteManual()" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="">-- Seleccionar Cliente --</option>
            </select>
        </div>
    </div>

    <div class="currency-selector">
        <span>TIPO DE MONEDA:</span>
        <select id="moneda" onchange="autoGuardar()">
            <option value="MXN">Pesos Mexicanos (MXN)</option>
            <option value="USD">Dólares Americanos (USD)</option>
        </select>
    </div>

    <div class="presupuesto-banner">
        <h1>Cotización</h1>
        <div style="text-align: right;"><input type="text" id="fecha" style="border:none; background:transparent; color:white; text-align:right;"></div>
    </div>

    <div class="grid-inputs">
        <div><label>Atención a</label><input type="text" id="atencion" oninput="autoGuardar()"></div>
        <div><label>Proyecto</label><input type="text" id="proyecto" oninput="autoGuardar()"></div>
    </div>

    <table id="tablaItems">
        <thead>
            <tr>
                <th style="width:50%">DESCRIPCIÓN</th>
                <th style="width:10%">CANT.</th>
                <th style="width:15%">PRECIO UNIT.</th>
                <th style="width:15%">IMPORTE</th>
                <th style="width:5%"></th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>

    <div style="margin-top: 15px;">
        <button onclick="agregarSeccion()" style="padding: 8px;">+ Categoría</button>
        <button onclick="agregarFila()" style="padding: 8px; background: #28a745; color: white; border: none;">+ Concepto</button>
    </div>

    <div style="display: flex; justify-content: space-between; margin-top: 30px;">
        <div style="width: 60%;">
            <label style="font-weight:bold; color:#28a745">NOTAS:</label>
            <textarea id="notasFinales" style="width:100%; height:100px;" oninput="autoGuardar()"></textarea>
        </div>
        <div style="width: 35%; text-align: right; font-size: 16px;">
            <p>SUBTOTAL: <span id="subtotalDisplay"></span></p>
            <p>IVA (16%): <span id="ivaDisplay"></span></p>
            <h2 style="color:#28a745">TOTAL <span id="labelMoneda"></span>: <span id="totalDisplay"></span></h2>
        </div>
    </div>

    <button class="btn-pdf" onclick="generarPDF()">GENERAR COTIZACIÓN PDF</button>
</div>

<script>
    const CLIENTES_MANUALES = [
        { nombre: "Grupo de Lords", proyecto: "Filtración Industrial", ubicacion: "Monterrey, N.L." },
        { nombre: "Residencial San Pedro", proyecto: "Generador Osoley 30L", ubicacion: "San Pedro Garza García" }
    ];

    function inicializar() {
        const select = document.getElementById('selectCliente');
        CLIENTES_MANUALES.forEach((c, idx) => {
            let opt = document.createElement('option');
            opt.value = idx; opt.textContent = c.nombre;
            select.appendChild(opt);
        });
        document.getElementById('fecha').value = new Date().toLocaleDateString('es-MX', {day:'2-digit', month:'long', year:'numeric'});
        const backup = localStorage.getItem('green_backup_multi');
        if(backup) { aplicarDatos(JSON.parse(backup)); } else { agregarSeccion("Equipos"); agregarFila(); }
    }

    function agregarSeccion(t = "") {
        let r = document.getElementById("cuerpoTabla").insertRow();
        r.className = "fila-especialidad";
        r.innerHTML = `<td colspan="3"><input type="text" value="${t}" placeholder="CATEGORÍA" oninput="autoGuardar()" style="width:100%; border:none; background:transparent; font-weight:bold;"></td><td class="sub-esp" style="text-align:right"></td><td><button onclick="this.closest('tr').remove(); autoGuardar()">×</button></td>`;
    }

    function agregarFila(v = ["", "1", "0"]) {
        let r = document.getElementById("cuerpoTabla").insertRow();
        r.innerHTML = `<td><textarea oninput="autoGuardar()" style="width:100%; border:none;">${v[0]}</textarea></td><td><input type="number" class="cant" value="${v[1]}" oninput="autoGuardar()" style="width:100%; border:none;"></td><td><input type="number" class="prec" value="${v[2]}" oninput="autoGuardar()" style="width:100%; border:none;"></td><td class="imp" style="text-align:right"></td><td><button onclick="this.closest('tr').remove(); autoGuardar()">×</button></td>`;
    }

    function autoGuardar() {
        const filas = [];
        for(let r of document.getElementById("cuerpoTabla").rows) {
            if(r.classList.contains("fila-especialidad")) filas.push({t:'s', v: r.querySelector("input").value});
            else { let i = r.querySelectorAll("textarea, input"); filas.push({t:'f', v: [i[0].value, i[1].value, i[2].value]}); }
        }
        localStorage.setItem('green_backup_multi', JSON.stringify({
            atencion: document.getElementById('atencion').value, proyecto: document.getElementById('proyecto').value,
            notas: document.getElementById('notasFinales').value, moneda: document.getElementById('moneda').value, filas: filas
        }));
        recalcular();
    }

    function aplicarDatos(d) {
        document.getElementById('atencion').value = d.atencion || "";
        document.getElementById('proyecto').value = d.proyecto || "";
        document.getElementById('notasFinales').value = d.notas || "";
        document.getElementById('moneda').value = d.moneda || "MXN";
        document.getElementById("cuerpoTabla").innerHTML = "";
        d.filas.forEach(f => { if(f.t === 's') agregarSeccion(f.v); else agregarFila(f.v); });
        recalcular();
    }

    function recalcular() {
        let total = 0; let sub = 0; let currentS = null;
        const moneda = document.getElementById('moneda').value;
        const simb = moneda === "USD" ? "USD $" : "$";
        const fmt = (n) => n.toLocaleString('en-US', {minimumFractionDigits:2});

        for(let r of document.getElementById("cuerpoTabla").rows) {
            if(r.classList.contains("fila-especialidad")) {
                if(currentS) currentS.querySelector(".sub-esp").innerText = simb + " " + fmt(sub);
                currentS = r; sub = 0;
            } else {
                let c = parseFloat(r.querySelector(".cant").value) || 0;
                let p = parseFloat(r.querySelector(".prec").value) || 0;
                let imp = c * p; r.querySelector(".imp").innerText = simb + " " + fmt(imp);
                sub += imp; total += imp;
            }
        }
        if(currentS) currentS.querySelector(".sub-esp").innerText = simb + " " + fmt(sub);
        document.getElementById('labelMoneda').innerText = "(" + moneda + ")";
        document.getElementById('subtotalDisplay').innerText = simb + " " + fmt(total);
        document.getElementById('ivaDisplay').innerText = simb + " " + fmt(total * 0.16);
        document.getElementById('totalDisplay').innerText = simb + " " + fmt(total * 1.16);
    }

    async function generarPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const moneda = document.getElementById('moneda').value;
        const simb = moneda === "USD" ? "USD $" : "$";
        const fmt = (v) => v.toLocaleString('en-US', {minimumFractionDigits:2});
        const logo = document.getElementById('imgLogo');

        doc.setFillColor(40, 167, 69); doc.rect(0, 40, 210, 15, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("COTIZACIÓN (" + moneda + ")", 15, 50);
        try { if(logo.complete) doc.addImage(logo, 'PNG', 135, 10, 60, 24); } catch(e){}

        let body = [];
        for(let r of document.getElementById("cuerpoTabla").rows) {
            if(r.classList.contains("fila-especialidad")) {
                body.push([{content: r.querySelector("input").value.toUpperCase(), colSpan:3, styles:{fillColor:[230,245,230], fontStyle:'bold'}}, {content: r.querySelector(".sub-esp").innerText, styles:{fillColor:[230,245,230], halign:'right', fontStyle:'bold'}}]);
            } else {
                let i = r.querySelectorAll("textarea, input");
                body.push([i[0].value, i[1].value, simb + " " + fmt(parseFloat(i[2].value)), simb + " " + fmt(parseFloat(i[1].value)*parseFloat(i[2].value))]);
            }
        }

        doc.autoTable({ startY: 85, head: [['DESCRIPCIÓN', 'CANT.', 'P. UNITARIO', 'IMPORTE']], body: body, theme: 'striped', headStyles: {fillColor: [40, 167, 69]} });
        
        let fY = doc.lastAutoTable.finalY + 10;
        doc.setTextColor(0,0,0); doc.setFontSize(10);
        doc.text("TOTAL " + moneda + ": " + document.getElementById('totalDisplay').innerText, 195, fY + 20, {align:'right'});
        doc.save("Cotizacion_GreenElements_" + moneda + ".pdf");
    }
</script>
</body>
</html>
